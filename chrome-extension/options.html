<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Windkey Einstellungen</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Windkey Einstellungen</h1>
    <form id="settings-form">
      <div class="form-group">
        <label for="server-url">Server-Adresse (LAN)</label>
        <input type="url" id="server-url" placeholder="https://192.168.2.42:5000" required>
        <p class="hint">Die HTTPS-Adresse deines Windkey-Servers im Heimnetzwerk. Standard: https://localhost:5000</p>
      </div>
      <button type="submit" class="btn btn-primary">Speichern</button>
      <p id="status" class="status"></p>
    </form>
  </div>
  <script type="module" src="options.js"></script>
</body>
</html>
